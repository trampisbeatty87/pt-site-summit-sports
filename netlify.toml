# Netlify build configuration.
# Netlify runs `node build.js`, which renders dist/ from content.json.

[build]
  command = "node build.js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Cache static assets aggressively; HTML stays fresh.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
